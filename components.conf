# ============================================
# OneShell POS - Component Tag Configuration
#
# Set the git tag or branch for each application repo.
# The build script clones each repo at the specified tag.
#
# Examples:
#   POS_CLIENT_BACKEND_TAG="v1.2.0"     # specific release tag
#   POS_CLIENT_BACKEND_TAG="master"      # latest master branch
#
# To build a release, update tags here and run:
#   ./build-installer.sh 1.0.0
# ============================================

# Shared library (must be built before PosClientBackend)
ONESHELL_COMMONS_TAG="master"

# Java backend (Spring Boot JAR)
POS_CLIENT_BACKEND_TAG="master"

# Node.js backend
POS_NODE_BACKEND_TAG="master"

# React frontend (built with npm run build, served by Nginx)
POS_FRONTEND_TAG="master"

# Python backend (Flask)
POS_PYTHON_BACKEND_TAG="master"
