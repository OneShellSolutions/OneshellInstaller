# ============================================
# OneShell POS - Component Version Overrides
#
# Leave EMPTY to auto-detect latest release tag from GitHub.
# Set a value to pin a specific version.
#
# Resolution order:
#   1. Value set here (pinned)
#   2. Latest GitHub release tag (auto-detected via API)
#   3. Fallback to "master" if no releases exist
#
# Examples:
#   POS_CLIENT_BACKEND_TAG="v1.2.0"   # pin to specific release
#   POS_CLIENT_BACKEND_TAG=""          # auto: use latest release tag
# ============================================

# Shared library
ONESHELL_COMMONS_TAG=""

# Java backend (Spring Boot JAR)
POS_CLIENT_BACKEND_TAG=""

# Node.js backend
POS_NODE_BACKEND_TAG=""

# React frontend (served by Nginx)
POS_FRONTEND_TAG=""

# Python backend (Flask)
POS_PYTHON_BACKEND_TAG=""
