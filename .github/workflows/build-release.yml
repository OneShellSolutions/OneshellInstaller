name: Build & Release Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Installer version (e.g. 1.0.0)'
        required: true
      oneshell_commons_tag:
        description: 'oneshell-commons tag (empty = latest release)'
        required: false
        default: ''
      pos_client_backend_tag:
        description: 'PosClientBackend tag (empty = latest release)'
        required: false
        default: ''
      pos_node_backend_tag:
        description: 'PosNodeBackend tag (empty = latest release)'
        required: false
        default: ''
      pos_frontend_tag:
        description: 'PosFrontend tag (empty = latest release)'
        required: false
        default: ''
      pos_python_backend_tag:
        description: 'PosPythonBackend tag (empty = latest release)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout installer repo
        uses: actions/checkout@v4

      - name: Set version from tag or input
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            TAG="${GITHUB_REF#refs/tags/v}"
            echo "VERSION=${TAG}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Java 24
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '24'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y nsis rsync
          npm install -g pkg
          pip install pip --upgrade

      - name: Cache runtimes
        uses: actions/cache@v4
        with:
          path: target/cache
          key: runtimes-jre24-mongo8.0.4-node20.18.1-nats2.10.22-nginx1.26.2
          restore-keys: runtimes-

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-

      - name: Build installer
        run: |
          chmod +x build-installer.sh
          ./build-installer.sh ${{ steps.version.outputs.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_PAT }}
          ONESHELL_COMMONS_TAG: ${{ github.event.inputs.oneshell_commons_tag }}
          POS_CLIENT_BACKEND_TAG: ${{ github.event.inputs.pos_client_backend_tag }}
          POS_NODE_BACKEND_TAG: ${{ github.event.inputs.pos_node_backend_tag }}
          POS_FRONTEND_TAG: ${{ github.event.inputs.pos_frontend_tag }}
          POS_PYTHON_BACKEND_TAG: ${{ github.event.inputs.pos_python_backend_tag }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: OneShellPOS-Setup-${{ steps.version.outputs.VERSION }}
          path: target/OneShellPOS-Setup-${{ steps.version.outputs.VERSION }}.exe

      - name: Upload manifest
        uses: actions/upload-artifact@v4
        with:
          name: manifest
          path: target/bundle/manifest.json

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "OneShell POS v${{ steps.version.outputs.VERSION }}"
          files: |
            target/OneShellPOS-Setup-${{ steps.version.outputs.VERSION }}.exe
            target/bundle/manifest.json
          body: |
            ## OneShell POS v${{ steps.version.outputs.VERSION }}

            ### Bundled Runtimes
            | Runtime | Version |
            |---------|---------|
            | Java JRE | 24 |
            | Node.js | 20.18.1 |
            | Python | 3.11.9 |
            | MongoDB | 8.0.4 |
            | NATS | 2.10.22 |
            | Nginx | 1.26.2 |

            ### Application Versions
            See `manifest.json` for exact tags used in this build.

            ### Install
            1. Download `OneShellPOS-Setup-${{ steps.version.outputs.VERSION }}.exe`
            2. Run as Administrator
            3. POS at `http://localhost`, Monitor at `http://localhost:3005`

            Existing installations auto-update within 1 hour.
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
